version: '3.8'

services:
  php:
    image: php:8.3-fpm
    container_name: symfony_php
    volumes:
      - .:/var/www
    working_dir: /var/www
    ports:
      - "9000:9000"
    command: bash -c "apt update && apt install -y libzip-dev unzip && docker-php-ext-install pdo pdo_mysql && php-fpm"

  nginx:
    image: nginx:latest
    container_name: symfony_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mysql:8
    container_name: symfony_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_db
    ports:
      - "3307:3306"

  mailer:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "1025:1025"
      - "8025:8025"